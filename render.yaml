# Render Blueprint for the Laravel web app + queue worker.
# MySQL is NOT a native Render managed database. Use one of these:
# 1) Deploy MySQL as a private Docker service on Render (see deployment guide), or
# 2) Use an external MySQL host and set DB_* env vars manually in the dashboard.

services:
  - type: web
    name: cattle-system
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    autoDeploy: true
    disk:
      name: cattle-storage
      mountPath: /var/www/html/storage/app
      sizeGB: 10
    envVars:
      - key: APP_NAME
        value: Cattle System
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: RUN_MIGRATIONS
        value: "true"
      - key: RUN_SEEDERS
        value: "false"

  - type: worker
    name: cattle-queue
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerCommand: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        fromService:
          type: web
          name: cattle-system
          envVarKey: APP_KEY
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: QUEUE_CONNECTION
        value: database
      - key: RUN_MIGRATIONS
        value: "false"
