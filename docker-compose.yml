services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cattle-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_NAME: "${APP_NAME:-Cattle System}"
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost:8080}"
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-cattlesystem}"
      DB_USERNAME: "${DB_USERNAME:-cattle}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "${RUN_SEEDERS:-false}"
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cattle-queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90"]
    environment:
      APP_NAME: "${APP_NAME:-Cattle System}"
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost:8080}"
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-cattlesystem}"
      DB_USERNAME: "${DB_USERNAME:-cattle}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
      RUN_MIGRATIONS: "false"
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: cattle-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT_PUBLISH:-3307}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-cattlesystem}"
      MYSQL_USER: "${DB_USERNAME:-cattle}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  app_storage:
  app_logs:
